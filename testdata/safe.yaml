version: 2.2
log:
  output: stdout
  level: info

server:
  host: 127.0.0.1
  port: 8080

database:
  host: localhost
  port: 5432
  username: admin
  password: $DB_PASSWORD

storage:
  digest-algorithm: SHA256

tls:
  enabled: true
  cert_file: /etc/ssl/certs/server.crt
  key_file: /etc/ssl/private/server.key
